<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mosaic</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>Mosaic Studio</h1>
            <p id="statusText">Loading gradient-400x400.jpg</p>
          </div>
        </div>

        <div class="toolbar" aria-label="Primary actions">
          <button class="icon-button" id="uploadButton" type="button" data-tooltip="Upload source image" aria-label="Upload source image">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 16V4"></path>
              <path d="m7 9 5-5 5 5"></path>
              <path d="M5 20h14"></path>
            </svg>
          </button>
          <button class="icon-button" id="renderButton" type="button" data-tooltip="Render mosaic" aria-label="Render mosaic">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
              <path d="M21 4v6h-6"></path>
            </svg>
          </button>
          <button class="icon-button" id="downloadPngButton" type="button" data-tooltip="Export PNG" aria-label="Export PNG">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 21h14"></path>
            </svg>
          </button>
          <button class="icon-button text-icon" id="downloadSvgButton" type="button" data-tooltip="Export SVG" aria-label="Export SVG">SVG</button>
          <button class="icon-button" id="resetButton" type="button" data-tooltip="Reset controls" aria-label="Reset controls">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 4v6h6"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="side-panel controls-panel" aria-label="Mosaic controls">
          <section class="panel-section source-section">
            <div class="section-heading">
              <h2>Source</h2>
              <span id="fileMeta">gradient-400x400.jpg</span>
            </div>
            <label class="drop-zone" id="dropZone">
              <input id="imageInput" type="file" accept="image/*" />
              <canvas id="sourcePreview" width="360" height="230" aria-label="Source preview"></canvas>
              <span>Upload source image</span>
            </label>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <h2>Grid</h2>
            </div>

            <label class="range-field" for="cellSize">
              <span>Block size</span>
              <output id="cellSizeValue">50 px</output>
              <input id="cellSize" type="range" min="0" max="0" value="0" step="1" />
            </label>

            <label class="range-field" for="maxOutput">
              <span>Canvas size</span>
              <output id="maxOutputValue">1400 px</output>
              <input id="maxOutput" type="range" min="100" max="2500" value="1400" step="100" />
            </label>
          </section>
          <section class="panel-section">
            <div class="section-heading">
              <h2>Render Mode</h2>
            </div>
            <div class="segmented" role="group" aria-label="Render mode">
              <button class="active" type="button" data-mode="ink">Ink</button>
              <button type="button" data-mode="color">Color</button>
              <button type="button" data-mode="duo">Duo</button>
            </div>
            <div class="duo-colors" id="duoColors" aria-label="Duo colors">
              <label class="color-field" for="duoPaper">
                <span>Paper</span>
                <input id="duoPaper" type="color" value="#117c74" />
              </label>
              <label class="color-field" for="duoInk">
                <span>Ink</span>
                <input id="duoInk" type="color" value="#a63e64" />
              </label>
            </div>
          </section>
          <section class="panel-section">
            <div class="section-heading">
              <h2>Tone</h2>
            </div>

            <label class="range-field" for="contrast">
              <span>Contrast</span>
              <output id="contrastValue">1.10</output>
              <input id="contrast" type="range" min="0.5" max="1.8" value="1.1" step="0.05" />
            </label>

            <label class="range-field" for="brightness">
              <span>Brightness</span>
              <output id="brightnessValue">0.00</output>
              <input id="brightness" type="range" min="-0.3" max="0.3" value="0" step="0.02" />
            </label>
          <div class="panel-section histogram" id="toneHistogram" aria-label="Tone histogram"></div>
          </section>


        </aside>

        <section class="stage" aria-label="Mosaic preview">
          <div class="canvas-frame">
            <canvas id="outputCanvas" aria-label="Rendered mosaic"></canvas>
            <div class="empty-state" id="emptyState">Preparing canvas</div>
          </div>

          <footer class="stage-footer">
            <details class="panel-section advanced-settings">
              <summary>Advanced Settings</summary>
              <div class="advanced-settings-body">

                <section class="advanced-panel advanced-map" aria-label="Current map">
                  <div class="section-heading">
                    <h2>Current Map</h2>
                  </div>
                  <div class="map-list">
                    <span>Average RGB</span>
                    <span>Luminance</span>
                    <span>Tone bucket</span>
                    <span>Tile render</span>
                  </div>
                </section>  

                <section class="advanced-panel" aria-label="Advanced render controls">
                  <div class="section-heading">
                    <h2>Render Settings</h2>
                  </div>
                  <label class="range-field" for="gamma">
                    <span>Gamma</span>
                    <output id="gammaValue">1.00</output>
                    <input id="gamma" type="range" min="0.55" max="1.65" value="1" step="0.05" />
                  </label>

                  <label class="range-field" for="colorStrength">
                    <span>Color strength</span>
                    <output id="colorStrengthValue">72%</output>
                    <input id="colorStrength" type="range" min="0" max="100" value="72" step="1" />
                  </label>

                  <label class="range-field" for="exportScale">
                    <span>PNG export scale</span>
                    <output id="exportScaleValue">3x</output>
                    <input id="exportScale" type="range" min="1" max="8" value="3" step="1" />
                  </label>

                  <label class="toggle-row" for="showGrid">
                    <span>Grid lines</span>
                    <input id="showGrid" type="checkbox" />
                  </label>

                  <label class="toggle-row" for="randomRotation">
                    <span>Random tile rotation</span>
                    <input id="randomRotation" type="checkbox" />
                  </label>

                  <label class="toggle-row" for="autoRender">
                    <span>Auto render</span>
                    <input id="autoRender" type="checkbox" checked />
                  </label>
                </section>

                <section class="advanced-panel" aria-label="Render statistics">
                  <div class="section-heading">
                    <h2>Render Statistics</h2>
                  </div>
                  <div class="advanced-metrics">
                    <div class="stat">
                      <strong id="cellCount">0</strong>
                      <span>cells</span>
                    </div>
                    <div class="stat">
                      <strong id="outputSize">0 x 0</strong>
                      <span>output</span>
                    </div>
                    <div class="stat">
                      <strong id="renderTime">0 ms</strong>
                      <span>render</span>
                    </div>              
                  </div>
                  </section>               
              </div>
            </details>
          </footer>
        </section>

        <aside class="side-panel tiles-panel" aria-label="Tile controls">
          <section class="panel-section">
            <div class="section-heading">
              <h2>Tiles</h2>
            </div>
            <div class="segmented" role="group" aria-label="Tile pack">
              <button class="active" type="button" data-pack="hatch">Hatch</button>
              <button type="button" data-pack="glyph">Glyph</button>
              <button type="button" data-pack="dot">Dot</button>
<!--              <button type="button" data-pack="block">Block</button> -->
              <button type="button" data-pack="custom">Custom</button>
            </div>
          </section>

          <section class="panel-section custom-tiles-section" id="customTilesSection" hidden>
            <div class="section-heading">
              <h2>Custom Tiles</h2>
              <button class="mini-button" id="customTileUploadButton" type="button">Upload</button>
            </div>
            <input class="hidden-input" id="customTileInput" type="file" accept="image/*" multiple />
            <div class="custom-tile-grid" id="customTileGrid" aria-label="Custom tone images"></div>
          </section>


          <section class="panel-section tone-section" id="toneTilesSection">
            <div class="section-heading">
              <h2>Tone Tiles</h2>
<!--              <span>1 to 10</span> -->
            </div>
            <div class="tone-strip" id="toneStrip"></div>
          </section>

        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
